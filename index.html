<html>
<head>
    <title>AR Turtle</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="lib/codemirror.css">
    <link rel="stylesheet" href="addon/hint/show-hint.css">
    <style>
        /* Extra CodeMirror CSS */
        .CodeMirror{border-top:1px solid #888;border-bottom:1px solid #888; height: 100%;}
        nav ul{padding-left:0}nav ul li{display:inline;border:1px solid #000;padding:5px;border-radius:10px}nav li.active{color:#fff;background-color:#3954AE}

        /* Mode select */
        #modeSelect { font-family: Arial, sans-serif; font-size: 14px; border: 1px solid #000; border-radius: 8px; padding: 4px 8px; cursor: pointer; background: #fff; }

        /* Blockly container — fills left panel exactly like CodeMirror does */
        #blockly-area { width: 100%; height: 100%; display: none; position: relative; }
        #blockly-div  { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        #fsContainer {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #fsContainer:fullscreen {
            background: #000;
        }
        #fsContainer:fullscreen #canvasWrapper {
            width: 100vmin !important;
            height: 100vmin !important;
        }

        #canvasWrapper {
            position: relative;
        }

        #camera, #turtle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #turtle { z-index: 20; }

        /* Split Panel CSS */
        .panel-container { height: 91vh; }
        .panel-left, .panel-right { padding: 10px; min-height: 200px }
        .panel-container { width: 100%; }
        .panel-container { display: flex; flex-direction: row; overflow: hidden; }
        .panel-left {
            flex: 0 0 auto;
            width: 300px;
            min-width: 150px;
            white-space: nowrap;
            background: #838383;
            color: #fff
        }
        .splitter {
            flex: 0 0 auto;
            width: 18px;
            background: url(https://raw.githubusercontent.com/RickStrahl/jquery-resizable/master/assets/vsizegrip.png) center center no-repeat #535353;
            min-height: 200px;
            cursor: col-resize
        }
        .panel-right {
            flex: 1 1 auto;
            width: 100%;
            min-width: 200px;
            background: #eee;
            display: flex;
            flex-direction: column;
        }

        #console-wrap {
            flex: 0 0 auto;
            padding: 6px 10px 10px;
            background: #eee;
            font-family: sans-serif;
            font-size: 13px;
        }

        #console-label {
            margin: 0 0 4px;
            font-weight: bold;
        }

        #console-label a { color: #555; }

        #console {
            width: 100%;
            height: 120px;
            overflow-y: scroll;
            background: white;
            box-sizing: border-box;
            padding: 8px 10px;
            border: 1px solid gray;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #console .err { color: red; }
    </style>
</head>

<body>
    <!-- HTML Code Container (Holds written code, this is not the preview) -->
    <div id="code_text" style="display:none">
const turtle = new Turtle();
</div>
    <!-- Menu -->
    <nav>
    <ul style="font-family: Arial, sans-serif">
        <li style="border:none;padding:0"><select id="modeSelect"><option value="text">Text</option><option value="blocks">Blocks</option></select></li>
        <li id="cameraWrapper" style="display:none; border:none; padding:2px 8px">
            Camera: <select id="cameraSelect"></select>
        </li>
        <li id="cameraToggle" style="display:none">Turn Camera On</li>
        <li id="fullscreenBtn" style="float:right; margin-right: 4px">Fullscreen</li>
        <li id="execute" style="float:right; margin-right: 4px; background-color: green; color: white">
            Execute Program
        </li>
    </ul>
    </nav>
    
    <div class="panel-container">
        <div class="panel-container">
            <div class="panel-left" style="width: 50%">
                <div id="editor"></div>
                <div id="blockly-area">
                    <div id="blockly-div"></div>
                </div>
            </div>

            <div class="splitter"></div>

            <div class="panel-right">
                <!-- Camera and Drawing Canvases -->
                <div id="fsContainer">
                    <div id="canvasWrapper">
                        <canvas id="camera" height="600" width="600"></canvas>
                        <canvas id="turtle" height="600" width="600"></canvas>
                    </div>
                </div>
                <!-- Console Output -->
                <div id="console-wrap">
                    <p id="console-label">Console (<a href="javascript:clearConsole();">Clear</a>):</p>
                    <div id="console"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- CodeMirror JavaScript -->
    <script src="lib/codemirror.js"></script>
    <script src="addon/lint/lint.js"></script>
    <script src="addon/lint/jshint.js"></script>
    <script src="addon/lint/javascript-lint.js"></script>
    <script src="mode/javascript/javascript.js"></script>
    <script src="addon/hint/show-hint.js"></script>
    <script src="addon/hint/javascript-hint.js"></script>
    
    <!-- App JavaScript -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
